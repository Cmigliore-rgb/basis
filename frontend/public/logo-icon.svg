<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img">
  <title>PeakLedger</title>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 6 2, 0 4" fill="#60a5fa"/>
    </marker>
    <!-- Clip path shaped exactly like the PL text glyphs -->
    <clipPath id="pl-clip">
      <text x="50" y="72" font-family="Impact, 'Arial Black', sans-serif"
            font-size="28" font-weight="900" text-anchor="middle" letter-spacing="3">PL</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!-- Mountain: subtle fill, sharp miter outline -->
  <polygon points="50,18 8,84 92,84" fill="rgba(30,58,138,0.2)" stroke="#2563eb" stroke-width="2" stroke-linejoin="miter"/>

  <!-- PL text: faint, sits inside triangle -->
  <text x="50" y="72" font-family="Impact, 'Arial Black', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" letter-spacing="3"
        fill="rgba(255,255,255,0.22)">PL</text>

  <!-- Blue net worth line: 3 zigzags + steep breakout + arrow -->
  <polyline
    points="8,82 20,70 28,76 40,60 48,66 60,48 66,54 86,6"
    fill="none" stroke="#3b82f6" stroke-width="2.2"
    stroke-linejoin="miter" stroke-linecap="butt"
    marker-end="url(#arr)"/>

  <!-- White overlay of the same line, clipped to PL glyph shapes only -->
  <polyline
    points="8,82 20,70 28,76 40,60 48,66 60,48 66,54 86,6"
    fill="none" stroke="white" stroke-width="2.2"
    stroke-linejoin="miter" stroke-linecap="butt"
    clip-path="url(#pl-clip)"/>
</svg>
